<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dune Drift</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #1c0a18;
    color: #f7d39a;
    font-family: "Courier New", monospace;
    overflow: hidden;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #1c0a18;
    box-shadow: 0 0 50px rgba(232, 90, 58, 0.25);
    border: 2px solid #3a1825;
    max-width: 95vw;
    max-height: 85vh;
  }
  #hud {
    margin-top: 10px;
    font-size: 13px;
    letter-spacing: 1px;
    opacity: 0.7;
    text-align: center;
  }
  #hud b { color: #ffb86a; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="640" height="360"></canvas>
  <div id="hud">
    <b>&larr; &rarr;</b> move &nbsp; <b>C</b> jump &nbsp; <b>X</b> dash &nbsp; <b>R</b> restart
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
