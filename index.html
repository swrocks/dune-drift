<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dune Drift</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0a0612;
    color: #ffb86a;
    font-family: "Courier New", monospace;
    overflow: hidden;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    background: #0a0612;
    display: block;
    /* Fill the viewport while keeping 16:9 aspect ratio.
       On a 16:9 screen this is edge-to-edge; on other aspects we
       letterbox the off-axis dimension. */
    width: min(100vw, 177.78vh);   /* 100vh * 16/9 */
    height: min(100vh, 56.25vw);   /* 100vw * 9/16 */
  }
  #hud {
    position: fixed;
    left: 50%;
    bottom: 12px;
    transform: translateX(-50%);
    font-size: 12px;
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 #000;
    text-align: center;
    pointer-events: none;
    color: #f7d39a;
  }
  #hud b { color: #ffb86a; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="640" height="360"></canvas>
</div>
<div id="hud">
  <b>&larr; &rarr;</b> MOVE &nbsp; <b>C</b> JUMP &nbsp; <b>X</b> DASH &nbsp; <b>R</b> RESTART &nbsp; <b>N</b> NEXT &nbsp; <b>1-5</b> JUMP TO LEVEL
</div>
<script src="game.js"></script>
</body>
</html>
